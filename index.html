<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deepak Studio | Wedding Photographer Lucknow</title>

<meta name="description" content="Deepak Studio Lucknow professional wedding photographer. Pre wedding shoot, cinematic wedding film, wedding albums.">
<meta name="keywords" content="Deepak Studio, wedding photographer Lucknow, pre wedding shoot Lucknow, cinematic wedding film">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
overflow-x:hidden;
font-family:'Poppins',sans-serif;
background:#f6f1ea;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
background:white;
padding:15px 8%;
display:flex;
align-items:center;
justify-content:space-between;
z-index:1000;
}

.logo img{
height:40px;
}

/* HERO */

.hero{
height:100vh;
position:relative;
overflow:hidden;
}

.hero-slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
animation:slider 30s infinite;
}

.hero-slide:nth-child(1){animation-delay:0s}
.hero-slide:nth-child(2){animation-delay:5s}
.hero-slide:nth-child(3){animation-delay:10s}
.hero-slide:nth-child(4){animation-delay:15s}
.hero-slide:nth-child(5){animation-delay:20s}
.hero-slide:nth-child(6){animation-delay:25s}

@keyframes slider{

0%{opacity:0}
5%{opacity:1}
20%{opacity:1}
25%{opacity:0}
100%{opacity:0}

}

.hero-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:50px;
color:white;
}

.tagline{
font-family:'Playfair Display',serif;
font-style:italic;
letter-spacing:4px;
font-size:22px;
color:white;
margin-top:10px;
}

/* SECTION */

.section{
padding:80px 8%;
text-align:center;
}

.section h2{
font-family:'Playfair Display',serif;
font-size:38px;
margin-bottom:40px;
}

/* STORIES */

.stories{
background:#e9e1d5;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
cursor:pointer;
border-radius:6px;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

.lightbox.active{
display:flex;
}

/* REVIEWS */

.review{
display:none;
font-size:18px;
}

.review.active{
display:block;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
right:15px;
bottom:20px;
z-index:1000;
}

.whatsapp img{
width:55px;
}

/* LOADER */

#loader{
position:fixed;
width:100%;
height:100%;
background:#f6f1ea;
display:flex;
align-items:center;
justify-content:center;
font-family:'Playfair Display';
font-size:28px;
z-index:3000;
}

</style>
</head>

<body>

<div id="loader">Deepak Studio</div>

<header>

<div class="logo">
<img src="logo.png">
</div>

</header>

<section class="hero">

<img src="01.jpg" class="hero-slide">
<img src="02.jpg" class="hero-slide">
<img src="5.jpg" class="hero-slide">
<img src="15.jpg" class="hero-slide">
<img src="20.jpg" class="hero-slide">
<img src="25.jpg" class="hero-slide">

<div class="hero-text">

<h1>Deepak Studio</h1>
<p class="tagline">Photographing Your Moments Forever</p>

</div>

</section>

<section class="section stories">

<h2>Stories From Deepak Studio</h2>

<div class="gallery">

<img src="01.jpg">
<img src="02.jpg">
<img src="5.jpg">
<img src="15.jpg">
<img src="2.jpg">
<img src="3.jpg">
<img src="25.jpg">
<img src="20.jpg">
<img src="29.jpg">

</div>

</section>

<section class="section">

<h2>Client Reviews</h2>

<div class="review active">
Amazing photography and beautiful wedding album.<br>
<strong>Riya & Aman</strong>
</div>

<div class="review">
Best wedding photographer in Lucknow.<br>
<strong>Pooja & Rahul</strong>
</div>

<div class="review">
Cinematic wedding film was absolutely perfect.<br>
<strong>Neha & Karan</strong>
</div>

</section>

<div class="lightbox" id="lightbox">
<img src="">
</div>

<a class="whatsapp" href="https://wa.me/918081721313">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<script>

/* PAGE LOADER */

window.addEventListener("load",function(){
document.getElementById("loader").style.display="none";
});

/* LIGHTBOX */

const lightbox=document.getElementById("lightbox");
const lightboxImg=lightbox.querySelector("img");
const images=document.querySelectorAll(".gallery img");

images.forEach(img=>{
img.onclick=()=>{
lightbox.classList.add("active");
lightboxImg.src=img.src;
}
});

lightbox.onclick=()=>{
lightbox.classList.remove("active");
}

/* REVIEW SLIDER */

let reviews=document.querySelectorAll(".review");
let index=0;

setInterval(()=>{

reviews[index].classList.remove("active");

index=(index+1)%reviews.length;

reviews[index].classList.add("active");

},4000);

</script>

</body>
</html>
